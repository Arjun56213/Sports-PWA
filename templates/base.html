<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
    <meta name="theme-color" content="#0a0a0f">
    <title>SportVault</title>
    <link rel="manifest" href="/static/manifest.json" />
    <link rel="icon" href="/static/icons/favicon.png">
    <link rel="stylesheet" href="/static/css/style.css" />
    <script defer src="/static/js/app.js"></script>
</head>
<body>
    <header class="site-header">
        <div>
            <p class="eyebrow">SportVault</p>
            <h1>Cricket and Soccer Tracker</h1>
        </div>
        <nav class="nav">
            <a href="{{ url_for('Home') }}">Home</a>
            <a href="{{ url_for('Search') }}">Search</a>
            {% if session.get('username') %}
                <a href="{{ url_for('Profile') }}">My Profile</a>
                <a href="{{ url_for('Logout') }}">Logout</a>
                <a href="{{ url_for('AddBatting') }}">Add Batting Entry</a>
                <a href="{{ url_for('AddBowling') }}">Add Bowling Entry</a>
                <a href="{{ url_for('AddSoccer') }}">Add Soccer Entry</a>
            {% else %}
                <a href="{{ url_for('Login') }}">Login</a>
                <a href="{{ url_for('Register') }}">Register</a>
            {% endif %}
        </nav>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
