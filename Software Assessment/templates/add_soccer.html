{% extends "base.html" %}
{% block content %}
<section class="card form-card">
  <h2>Add Soccer Entry</h2>
  <form method="post" novalidate>
    <label>Date</label><input type="date" name="date" required>
    <label>Opposition</label><input type="text" name="opposition" required>
    <label>Venue</label><input type="text" name="venue" required>
    <label>Goals</label><input type="number" name="goals" min="0" value="0" required>
    <label>Assists</label><input type="number" name="assists" min="0" value="0" required>
    <label>Result</label>
    <select name="result" required>
      <option value="">Select</option><option>Win</option><option>Draw</option><option>Loss</option>
    </select>
    <button type="submit">Save</button>
  </form>
</section>
{% endblock %}
